<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Şifre Oluştur / Reset</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:system-ui;background:#0b1220;color:#fff}
    .box{width:min(560px,92vw);padding:20px;border:1px solid rgba(255,255,255,.14);border-radius:18px;background:rgba(255,255,255,.06)}
    button{padding:10px 14px;border:0;border-radius:12px;font-weight:900;cursor:pointer}
    .muted{opacity:.74}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
    a{color:#7dd3fc;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h2 style="margin:0 0 8px">Şifre oluştur / sıfırla</h2>
    <div class="muted" style="margin-bottom:12px">
      Mailde gelen linkte <code>#recovery_token=...</code> varsa, bu sayfayı onunla aç.
    </div>
    <button onclick="netlifyIdentity.open()">Şifre ekranını aç</button>
    <div class="muted" style="margin-top:12px;font-size:13px">
      Admin: <a href="/admin/">/admin/</a>
    </div>
  </div>

<script>
if (window.netlifyIdentity) {
  window.netlifyIdentity.init();
  const h = window.location.hash || "";
  if (h.includes("recovery_token") || h.includes("invite_token") || h.includes("confirmation_token")) {
    window.netlifyIdentity.open();
  }
}
</script>
</body>
</html>
